<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Mademoiselle favicon">
  <!-- Ivory rounded square base -->
  <rect x="0" y="0" width="32" height="32" rx="6" ry="6" fill="#FAF7F2"/>

  <!-- Lowercase italic m mark -->
  <text
    x="16"
    y="23"
    text-anchor="middle"
    font-family="Cormorant Garamond, Cormorant, Garamond, Times New Roman, serif"
    font-style="italic"
    font-weight="500"
    font-size="24"
    fill="#0D0F14"
    letter-spacing="-0.02em">m</text>

  <!-- Coral sparkle (top-right of mark) -->
  <circle cx="24" cy="9" r="1.25" fill="#F74F7D"/>
</svg>
